<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<script>
window.createjs = window.createjs || {};
window.AdobeAn = window.AdobeAn || {};
</script>

<script src="BygTek_20V3.js"></script>

<style>
body {
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#fff;
}

#animation_container {
  width:100%;
  max-width:1920px;
  aspect-ratio:1920 / 600;
}

canvas {
  width:100%;
  height:auto;
  display:block;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="animation_container">
  <canvas id="canvas" width="1920" height="600"></canvas>
</div>

<script>
var canvas, stage, exportRoot, anim_container;

function init() {

  canvas = document.getElementById("canvas");
  anim_container = document.getElementById("animation_container");

  var comp = AdobeAn.getComposition("18A209EB448844418D59406351C547B6");
  var lib = comp.getLibrary();

  var loader = new createjs.LoadQueue(false);

  loader.addEventListener("fileload", function(evt){
    if (evt.item.type === "image") {
      lib.images = lib.images || {};
      lib.images[evt.item.id] = evt.result;
    }
  });

  loader.addEventListener("complete", function(evt){

    var ss = comp.getSpriteSheet();

    for (var i = 0; i < lib.ssMetadata.length; i++) {
      ss[lib.ssMetadata[i].name] = new createjs.SpriteSheet({
        images: [lib.images[lib.ssMetadata[i].name]],
        frames: lib.ssMetadata[i].frames
      });
    }

    exportRoot = new lib.Untitled1();
    stage = new lib.Stage(canvas);

    // 🔥 DET HER ER KRITISK (manglede før)
    AdobeAn.compositionLoaded(lib.properties.id);

    stage.addChild(exportRoot);

// 🔥 FORCE TEXT2 (rigtig måde)
setTimeout(function() {

  function findText2(obj) {
    if (!obj) return;

    if (obj.constructor && obj.constructor.name === "text2") {
      obj._off = false;
      obj.alpha = 1;
    }

    if (obj.children) {
      obj.children.forEach(findText2);
    }
  }

  findText2(exportRoot);

}, 1500);

    createjs.Ticker.framerate = lib.properties.fps;
    createjs.Ticker.addEventListener("tick", function(event){
  stage.update(event);
    createjs.Ticker.timingMode = createjs.Ticker.RAF;
});

    exportRoot.gotoAndPlay(0);

    // RESPONSIVE (simpel og korrekt)
    function resize() {
      var w = 1920;
      var h = 600;

      var iw = window.innerWidth;
      var ratio = iw / w;

      canvas.style.width = iw + "px";
      canvas.style.height = (h * ratio) + "px";

      stage.scaleX = ratio;
      stage.scaleY = ratio;
    }

    window.addEventListener("resize", resize);
    resize();

    // klik
    canvas.onclick = function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
        "_blank"
      );
    };

  });

  loader.loadManifest(lib.properties.manifest);
}

window.onload = init;
</script>

</body>
</html>
