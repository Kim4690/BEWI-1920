<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<!-- DIN ORIGINAL JS -->
<script src="BygTek_20V3.js"></script>

<style>
body {
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#fff;
}

#animation_container {
  position:relative; /* 🔥 VIGTIG */
  width:100%;
  max-width:1920px;
}

canvas {
  width:100%;
  height:auto;
  display:block;
  cursor:pointer;
}

/* 🔥 START OVERLAY (blå) */
#start-overlay{
  position:absolute;
  inset:0;
  background:#26485F;
  z-index:10;
  pointer-events:none;
  opacity:1;
  transition:opacity 0.4s ease;
}

/* 🔥 TEXT2 FIX (som du allerede har) */
#text2-fix{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  
  width:800px;
  height:130px;

  background:url("images/CachedBmp_5.png") no-repeat;
  background-size:contain;

  opacity:0;
  transition:opacity 0.5s ease;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="animation_container">
  <canvas id="canvas" width="1920" height="600"></canvas>

  <!-- 🔥 overlay -->
  <div id="start-overlay"></div>

  <!-- 🔥 text2 -->
  <div id="text2-fix"></div>
</div>

<script>
var canvas, stage, exportRoot;

function init() {

  canvas = document.getElementById("canvas");

  var comp = AdobeAn.getComposition("18A209EB448844418D59406351C547B6");

  if (!comp) {
    setTimeout(init, 100);
    return;
  }

  var lib = comp.getLibrary();
  var ss = comp.getSpriteSheet();

  var loader = new createjs.LoadQueue(false);

  loader.addEventListener("fileload", function(evt){
    if (evt.item.type === "image") {
      lib.images = lib.images || {};
      lib.images[evt.item.id] = evt.result;
    }
  });

  loader.addEventListener("complete", function(){

    for (var i = 0; i < lib.ssMetadata.length; i++) {
      ss[lib.ssMetadata[i].name] = new createjs.SpriteSheet({
        images: [lib.images[lib.ssMetadata[i].name]],
        frames: lib.ssMetadata[i].frames
      });
    }

    exportRoot = new lib.Untitled1();
    stage = new lib.Stage(canvas);

    stage.addChild(exportRoot);

    var overlay = document.getElementById("start-overlay");
    var text2Fix = document.getElementById("text2-fix");

    createjs.Ticker.framerate = lib.properties.fps;

    createjs.Ticker.addEventListener("tick", function(){

      stage.update();

      var frame = exportRoot.currentFrame;

      // 🔁 RESET
      if(frame < 5){
        overlay.style.opacity = 1;
        text2Fix.style.opacity = 0;
      }

      // 🔥 VIS text1 (fjern overlay EFTER blå er færdig)
      if(frame > 60){
        overlay.style.opacity = 0;
      }

      // 🔥 VIS text2 (sidst)
      if(frame > 170){
        text2Fix.style.opacity = 1;
      }

    });

    exportRoot.gotoAndPlay(0);

    canvas.onclick = function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
        "_blank"
      );
    };

  });

  loader.loadManifest(lib.properties.manifest);
}

window.onload = init;
</script>

</body>
</html>
