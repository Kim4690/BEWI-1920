<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<script>
window.createjs = window.createjs || {};
window.AdobeAn = window.AdobeAn || {};
</script>

<script src="BygTek_20V3.js"></script>

<style>
body {
  margin:0;
}

#container {
  width:100%;
  max-width:1920px;
  margin:0 auto;
}

canvas {
  width:100%;
  height:auto;
  display:block;
}
</style>
</head>

<body>

<div id="container">
  <canvas id="canvas" width="1920" height="600"></canvas>
</div>

<script>
var canvas = document.getElementById("canvas");

function init() {

  var comp = AdobeAn.getComposition("18A209EB448844418D59406351C547B6");

  if (!comp) {
    setTimeout(init, 100);
    return;
  }

  var lib = comp.getLibrary();
  var loader = new createjs.LoadQueue(false);

  loader.addEventListener("fileload", function(evt){
    if (evt.item.type === "image") {
      lib.images = lib.images || {};
      lib.images[evt.item.id] = evt.result;
    }
  });

  loader.addEventListener("complete", function(){

    var ss = comp.getSpriteSheet();

    for (var i = 0; i < lib.ssMetadata.length; i++) {
      ss[lib.ssMetadata[i].name] = new createjs.SpriteSheet({
        images: [lib.images[lib.ssMetadata[i].name]],
        frames: lib.ssMetadata[i].frames
      });
    }

    var exportRoot = new lib.Untitled1();
    var stage = new lib.Stage(canvas);

    stage.addChild(exportRoot);

    // 🔥 FORCE text2 synlig (fix Adobe bug)
setTimeout(function() {
  exportRoot.children.forEach(function(child){
    if(child instanceof lib.text2){
      child._off = false;
      child.alpha = 1;
    }
  });
}, 1000);
    
    // 🔥 RESPONSIVE (REN OG STABIL)
function resize() {

  var w = 1920;
  var h = 600;

  var iw = window.innerWidth;

  var scale = iw / w;

  canvas.width = w;
  canvas.height = h;

  canvas.style.width = iw + "px";
  canvas.style.height = (h * scale) + "px";

  stage.scaleX = scale;
  stage.scaleY = scale;

}
    window.addEventListener("resize", resize);
    resize();

    createjs.Ticker.framerate = lib.properties.fps;
    createjs.Ticker.addEventListener("tick", function(){
  stage.update();
  console.log(exportRoot.currentFrame);
});

    exportRoot.gotoAndPlay(0);

    // klik
    canvas.onclick = function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
        "_blank"
      );
    };

  });

  loader.loadManifest(lib.properties.manifest);
}

window.onload = init;
</script>

</body>
</html>
